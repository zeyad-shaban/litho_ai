controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    
    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_trajectory_controller:
  ros__parameters:
    joints:
      - column1_carriage1_joint
      - carriage1_shoulder_joint
      - shoulder_elbow_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity